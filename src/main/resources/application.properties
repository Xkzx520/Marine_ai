spring.application.name=Marine_ai

# 数据库连接配置
spring.datasource.url=jdbc:mysql://localhost:3306/marine_ai_server?useUnicode=true&characterEncoding=utf-8&connectionCollation=utf8mb4_unicode_ci&serverTimezone=Asia/Shanghai
spring.datasource.hikari.connection-init-sql=SET NAMES utf8mb4
spring.datasource.username=root
spring.datasource.password=Gsr20060130$
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MyBatis配置
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.springboot.marine_ai.entity
mybatis.configuration.map-underscore-to-camel-case=true

# 服务端口（0.0.0.0 允许手机/模拟器通过局域网访问）
server.port=8080
server.address=0.0.0.0

# 文件上传配置
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# 上传文件保存路径（相对项目目录）
file.upload.path=./upload

# YOLO 海洋生物识别
ai.yolo.enabled=true
ai.yolo.python=C:/Users/Hejing/Desktop/Marine_ai/.venv/Scripts/python.exe
ai.yolo.script=./yolo/detect.py
ai.yolo.weights=./yolo/weights/marine_yolo.pt
ai.yolo.fallback-weights=./yolo/weights/yolov8n.pt
ai.yolo.classes=./yolo/data/marine_classes.txt
ai.yolo.class-map=./yolo/class_map.json
ai.yolo.confidence=0.45
ai.yolo.min-top-confidence=0.55
ai.yolo.min-brightness=28
ai.yolo.timeout-seconds=120

# 统一 UTF-8（HTTP 响应 + 日志，避免 Windows 控制台中文乱码）
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
spring.http.converters.preferred-json-mapper=jackson
logging.charset.console=UTF-8
logging.charset.file=UTF-8

# 网络请求日志（IDEA 控制台 / 日志文件按 TAG「MarineNetwork」过滤）
logging.level.MarineNetwork=INFO