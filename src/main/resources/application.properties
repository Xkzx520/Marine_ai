spring.application.name=Marine_ai

# 数据库连接配置
spring.datasource.url=jdbc:mysql://localhost:3306/marine_ai_server?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MyBatis配置
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.springboot.marine_ai.entity
mybatis.configuration.map-underscore-to-camel-case=true

# 服务端口
server.port=8080

# 文件上传配置
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# 上传文件保存路径
file.upload.path=D:/Marine_ai/upload